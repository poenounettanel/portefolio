<svg width="1000" height="500" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles / Gradients / Textures -->
  <defs>
    <linearGradient id="concreteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:0.45" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24" />
    </marker>
  </defs>

  <!-- Technical Background -->
  <rect width="1000" height="500" fill="#0f172a" rx="15"/>
  <path d="M0 50 h1000 M0 100 h1000 M0 150 h1000 M0 200 h1000 M0 250 h1000 M0 300 h1000 M0 350 h1000 M0 400 h1000 M0 450 h1000" stroke="#1e293b" stroke-width="1"/>
  <path d="M50 0 v500 M100 0 v500 M150 0 v500 M200 0 v500 M250 0 v500 M300 0 v500 M350 0 v500 M400 0 v500 M450 0 v500 M500 0 v500 M550 0 v500 M600 0 v500 M650 0 v500 M700 0 v500 M750 0 v500 M800 0 v500 M850 0 v500 M900 0 v500 M950 0 v500" stroke="#1e293b" stroke-width="1"/>

  <!-- Main Beam (Isometric View) -->
  <!-- Origin at (100, 300) -->
  <g transform="translate(100, 300) skewY(-10)">
    
    <!-- Dimensions Scale: 1m = 65px -->
    <!-- Span 1: 5.5m = 357.5px -->
    <!-- Span 2: 4.2m = 273px -->
    <!-- Span 3: 1.5m = 97.5px -->
    <!-- Total: 728px -->
    
    <!-- BEAM GEOMETRY (CONCRETE BOX) -->
    <!-- Front Face -->
    <rect x="0" y="-100" width="728" height="100" fill="url(#concreteGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Top Face (Perspective) -->
    <path d="M0 -100 L50 -130 L778 -130 L728 -100 Z" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
    <!-- Side Face (End of Cantilever) -->
    <path d="M728 -100 L778 -130 L778 -30 L728 0 Z" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)"/>

    <!-- REINFORCEMENT CAGE (Internal Visualization) -->
    <!-- Bottom Reinforcement (Main bars) -->
    <line x1="5" y1="-10" x2="723" y2="-10" stroke="#f97316" stroke-width="4" stroke-opacity="0.8"/>
    <line x1="5" y1="-20" x2="723" y2="-20" stroke="#f97316" stroke-width="4" stroke-opacity="0.8"/>
    
    <!-- Top Reinforcement -->
    <line x1="5" y1="-85" x2="723" y2="-85" stroke="#a855f7" stroke-width="2" stroke-opacity="0.7"/>
    <line x1="5" y1="-92" x2="723" y2="-92" stroke="#a855f7" stroke-width="2" stroke-opacity="0.7"/>

    <!-- Chapeaux over Supports -->
    <!-- Over V2 (at 357.5px) -->
    <line x1="280" y1="-95" x2="430" y2="-95" stroke="#fbbf24" stroke-width="5" stroke-opacity="1"/>
    <!-- Over V3 (at 630.5px) -->
    <line x1="560" y1="-95" x2="700" y2="-95" stroke="#fbbf24" stroke-width="5" stroke-opacity="1"/>

    <!-- Stirrups (Samples) -->
    <g stroke="rgba(255,255,255,0.4)" stroke-width="1.2">
      <rect x="20" y="-95" width="4" height="90" opacity="0.4"/>
      <rect x="60" y="-95" width="4" height="90" opacity="0.4"/>
      <rect x="100" y="-95" width="4" height="90" opacity="0.4"/>
      <rect x="140" y="-95" width="4" height="90" opacity="0.4"/>
      <rect x="180" y="-95" width="4" height="90" opacity="0.4"/>
      <rect x="357" y="-95" width="4" height="90" opacity="0.8"/> <!-- Support V2 -->
      <rect x="370" y="-95" width="4" height="90" opacity="0.8"/>
      <rect x="630" y="-95" width="4" height="90" opacity="0.8"/> <!-- Support V3 -->
      <rect x="645" y="-95" width="4" height="90" opacity="0.8"/>
    </g>

    <!-- COTATIONS (DIMENSION LINES) -->
    <g stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)">
      <!-- Span 1 -->
      <line x1="0" y1="40" x2="357.5" y2="40" />
      <!-- Span 2 -->
      <line x1="357.5" y1="40" x2="630.5" y2="40" />
      <!-- Span 3 (Cantilever) -->
      <line x1="630.5" y1="40" x2="728" y2="40" />
      
      <!-- Section Dimensions (Left) -->
      <line x1="-30" y1="0" x2="-30" y2="-100" />
      <line x1="0" y1="-120" x2="50" y2="-150" />
    </g>

    <!-- Dimension Labels -->
    <g fill="#fbbf24" font-family="Syne" font-size="14" font-weight="800" text-anchor="middle">
      <text x="178" y="65">5.50 m</text>
      <text x="494" y="65">4.20 m</text>
      <text x="679" y="65">1.50 m</text>
      
      <text x="-60" y="-50" transform="rotate(0, -60, -50)">H=50 cm</text>
      <text x="25" y="-160" transform="skewY(10)">L=27 cm</text>
    </g>

    <!-- Support Annotations -->
    <g fill="white" font-family="Syne" font-size="16" font-weight="900" text-anchor="middle">
      <circle cx="0" cy="5" r="15" fill="#a855f7"/> <text x="0" y="10">V1</text>
      <circle cx="357.5" cy="5" r="15" fill="#a855f7"/> <text x="357.5" y="10">V2</text>
      <circle cx="630.5" cy="5" r="15" fill="#a855f7"/> <text x="630.5" y="10">V3</text>
    </g>
  </g>

  <!-- Header Header -->
  <text x="500" y="50" fill="white" text-anchor="middle" font-family="Big Shoulders Display" font-size="32" letter-spacing="4">MODÉLISATION 3D TECHNIQUE : POUTRE CONTINUE</text>
  <rect x="420" y="65" width="160" height="2" fill="#a855f7"/>
  <text x="500" y="90" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Syne" font-size="14">VUE ISOMÉTRIQUE AVEC COTATIONS DÉTAILLÉES (EUROCODE 2)</text>

  <!-- Legend -->
  <g transform="translate(100, 470)" font-family="Syne" font-size="12">
    <rect x="0" y="-10" width="12" height="12" fill="#f97316"/> <text x="20" y="0" fill="white">Aciers Principaux (HA14/12)</text>
    <rect x="250" y="-10" width="12" height="12" fill="#fbbf24"/> <text x="270" y="0" fill="white">Chapeaux / Renforts Appuis</text>
    <rect x="500" y="-10" width="12" height="12" fill="#a855f7"/> <text x="520" y="0" fill="white">Montage / Cadres HA6</text>
    <text x="750" y="0" fill="#fbbf24" font-weight="800">Cote totale : 11.20 m</text>
  </g>
</svg>
